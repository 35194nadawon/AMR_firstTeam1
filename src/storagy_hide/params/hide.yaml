# 숨는팀(토이 가이드, 컨셉 3) 공통 파라미터 — hide_bringup.launch.py 가 모든 노드에 주입.
# hideout 좌표는 sync_points_yaml 과 자동 동기화.
hide_state_machine:
  ros__parameters:
    return_settle_s: 2.0
hide_aruco_dock:
  ros__parameters:
    target_id: 0
    stop_distance_m: 0.4
    target_frame: map
    hideout_x: -4.2
    hideout_y: -2.15
    hideout_yaw: 0.0
hide_human_perception:
  ros__parameters:
    fov_deg: 120.0
    zone_radius_m: 1.0
    yolo_conf: 0.7
    model: yolov8n.pt
    active_only_in_freeze: true
hide_dynamic_costmap:
  ros__parameters:
    resolution_m: 0.05
    frame_id: base_link
    active_only_in_freeze: true
